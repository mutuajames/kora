<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kora Console — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #171717; border: 1px solid #262626; border-radius: 12px; padding: 32px; width: 100%; max-width: 380px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .sub { color: #737373; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #a3a3a3; }
    input { width: 100%; padding: 10px 12px; background: #0a0a0a; border: 1px solid #262626; border-radius: 8px; color: #e5e5e5; font-size: 14px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #404040; }
    button { width: 100%; padding: 10px; background: #fafafa; color: #0a0a0a; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    button:hover { background: #e5e5e5; }
    .error { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kora Console</h1>
    <p class="sub">System administrator sign in</p>
    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
    <form method="POST" action="/console/login">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="admin@kora.local" required autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="••••••••" required>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
