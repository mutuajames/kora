{{define "list.html"}}
<div x-data="listView('{{.DocType.Name}}')" x-init="load()">
    <!-- Toolbar -->
    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
            <input type="text" placeholder="Search..." x-model="search"
                   @keyup.enter="load()"
                   class="px-3 py-2 border border-gray-300 rounded-md text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button @click="load()" class="btn btn-primary text-sm">Search</button>
        </div>
        <a href="/desk/doctype/{{.DocType.Name}}/new" class="btn btn-primary">
            + New {{.DocType.Name}}
        </a>
    </div>

    <!-- Filters -->
    <div class="flex gap-2 mb-4 flex-wrap">
        {{range .DocType.Fields}}
        {{if .InStandardFilter}}
        <select @change="addFilter('{{.Fieldname}}', $event.target.value); load()"
                class="px-2 py-1 border border-gray-300 rounded text-xs">
            <option value="">{{.Label}}</option>
            {{if eq .Fieldtype "Select"}}
                {{/* Options are newline-separated */}}
                {{range splitOptions .Options}}
                <option value="{{.}}">{{.}}</option>
                {{end}}
            {{end}}
        </select>
        {{end}}
        {{end}}
    </div>

    <!-- Table -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    {{range .DocType.Fields}}
                    {{if .InListView}}
                    <th>{{.Label}}</th>
                    {{end}}
                    {{end}}
                    <th>Modified</th>
                </tr>
            </thead>
            <tbody>
                <template x-if="loading">
                    <tr><td colspan="10" class="text-center py-8 text-gray-400">Loading...</td></tr>
                </template>
                <template x-if="!loading && rows.length === 0">
                    <tr><td colspan="10" class="text-center py-8 text-gray-400">No records found.</td></tr>
                </template>
                <template x-for="row in rows" :key="row.name">
                    <tr class="hover:bg-gray-50 cursor-pointer"
                        @click="window.location.href='/desk/doctype/{{.DocType.Name}}/' + row.name">
                        <td class="font-medium text-blue-600" x-text="row.name"></td>
                        {{range .DocType.Fields}}
                        {{if .InListView}}
                        <td x-text="formatField(row.'{{.Fieldname}}', '{{.Fieldtype}}')"></td>
                        {{end}}
                        {{end}}
                        <td class="text-xs text-gray-400" x-text="row.modified"></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="flex items-center justify-between mt-4 text-sm text-gray-600">
        <span x-text="'Total: ' + total"></span>
        <div class="flex gap-2">
            <button @click="prevPage()" :disabled="offset === 0" class="btn btn-secondary text-xs">← Prev</button>
            <button @click="nextPage()" :disabled="offset + limit >= total" class="btn btn-secondary text-xs">Next →</button>
        </div>
    </div>
</div>

<script>
    function listView(doctype) {
        return {
            doctype: doctype,
            rows: [],
            total: 0,
            loading: false,
            search: '',
            filters: [],
            limit: 25,
            offset: 0,

            async load() {
                this.loading = true;
                let url = `/api/resource/${this.doctype}?limit=${this.limit}&offset=${this.offset}`;
                if (this.search) {
                    // Add search as filter on title_field or name
                    url += `&filters=${encodeURIComponent(JSON.stringify([['name','like','%'+this.search+'%']]))}`;
                }
                try {
                    const resp = await fetch(url);
                    const json = await resp.json();
                    this.rows = json.data || [];
                    this.total = json.meta?.total || 0;
                } catch(e) {
                    console.error('Failed to load list:', e);
                }
                this.loading = false;
            },

            addFilter(field, value) {
                if (!value) return;
                // Update filter state for future use.
            },

            prevPage() {
                if (this.offset > 0) {
                    this.offset = Math.max(0, this.offset - this.limit);
                    this.load();
                }
            },

            nextPage() {
                if (this.offset + this.limit < this.total) {
                    this.offset += this.limit;
                    this.load();
                }
            },

            formatField(val, fieldtype) {
                if (val === null || val === undefined) return '';
                if (fieldtype === 'Check') return val ? '✓' : '✗';
                if (fieldtype === 'Date' && typeof val === 'string') return val.substring(0, 10);
                if (fieldtype === 'Datetime' && typeof val === 'string') return val.substring(0, 16);
                return String(val);
            }
        }
    }
</script>
{{end}}
