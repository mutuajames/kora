name: Customer
module: Fieldwork
title_field: company_name
search_fields: company_name, email
sort_field: modified
sort_order: DESC

fields:
  - fieldname: company_name
    fieldtype: Data
    label: Company Name
    reqd: true
    bold: true
    in_list_view: true
    search_index: true

  - fieldname: contact_person
    fieldtype: Data
    label: Contact Person
    in_list_view: true

  - fieldname: email
    fieldtype: Data
    label: Email
    options: Email
    in_list_view: true
    constraints:
      - type: regex
        pattern: "^[^@]+@[^@]+\\.[^@]+$"
        message: "Please enter a valid email address."

  - fieldname: phone
    fieldtype: Data
    label: Phone
    options: Phone
    in_list_view: true

  - fieldname: address
    fieldtype: Text
    label: Address

  - fieldname: city
    fieldtype: Data
    label: City
    in_list_view: true

  - fieldname: state
    fieldtype: Data
    label: State / Region

  - fieldname: country
    fieldtype: Data
    label: Country
    default: "United States"
