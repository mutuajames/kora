name: Work Order Approval
document_type: Work Order
is_active: true
workflow_state_field: status

states:
  - state: Draft
    doc_status: 0
    allow_edit: Field Technician
    style: default

  - state: Submitted
    doc_status: 0
    allow_edit: Service Manager
    style: warning

  - state: Approved
    doc_status: 1
    allow_edit: ""
    style: success

  - state: In Progress
    doc_status: 1
    allow_edit: Field Technician
    style: info

  - state: Completed
    doc_status: 1
    allow_edit: ""
    style: success

  - state: Rejected
    doc_status: 0
    allow_edit: Field Technician
    style: danger

transitions:
  - action: Submit for Approval
    from: Draft
    to: Submitted
    allowed: Field Technician
    condition: "len(doc.items) > 0"

  - action: Approve
    from: Submitted
    to: Approved
    allowed: Service Manager

  - action: Reject
    from: Submitted
    to: Rejected
    allowed: Service Manager

  - action: Begin Work
    from: Approved
    to: In Progress
    allowed: Field Technician
    condition: "doc.assigned_technician != ''"

  - action: Mark Complete
    from: In Progress
    to: Completed
    allowed: Field Technician

  - action: Revise
    from: Rejected
    to: Draft
    allowed: Field Technician
