name: Contract Lifecycle
document_type: Contract
is_active: true
workflow_state_field: status

states:
  - state: Draft
    doc_status: 0
    allow_edit: Contract Manager, Administrator
    style: default
  - state: Review
    doc_status: 0
    allow_edit: Contract Manager, Administrator
    style: warning
  - state: Active
    doc_status: 1
    allow_edit: ""
    style: success
  - state: Expired
    doc_status: 1
    allow_edit: ""
    style: danger
  - state: Terminated
    doc_status: 1
    allow_edit: ""
    style: danger

transitions:
  - action: Submit for Review
    from: Draft
    to: Review
    allowed: Contract Manager, Administrator
  - action: Activate
    from: Review
    to: Active
    allowed: Contract Manager, Administrator
    condition: "doc.end_date > 0"
  - action: Terminate
    from: Active
    to: Terminated
    allowed: Contract Manager, Administrator
  - action: Expire
    from: Active
    to: Expired
    allowed: Contract Manager, Administrator
