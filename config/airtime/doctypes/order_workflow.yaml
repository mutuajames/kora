name: Order Fulfillment
document_type: Order
is_active: true
workflow_state_field: status

states:
  - state: Draft
    doc_status: 0
    allow_edit: Sales Agent
    style: default

  - state: Confirmed
    doc_status: 0
    allow_edit: Sales Agent
    style: warning

  - state: Processing
    doc_status: 1
    allow_edit: ""
    style: info

  - state: Delivered
    doc_status: 1
    allow_edit: ""
    style: info

  - state: Completed
    doc_status: 1
    allow_edit: ""
    style: success

  - state: Cancelled
    doc_status: 2
    allow_edit: ""
    style: danger

transitions:
  - action: Confirm Order
    from: Draft
    to: Confirmed
    allowed: Sales Agent,Administrator
    condition: "len(doc.items) > 0"
    require_fields:
      - payment_method

  - action: Process Order
    from: Confirmed
    to: Processing
    allowed: Administrator

  - action: Mark Delivered
    from: Processing
    to: Delivered
    allowed: Administrator

  - action: Complete
    from: Delivered
    to: Completed
    allowed: Administrator

  - action: Cancel
    from: Draft
    to: Cancelled
    allowed: Sales Agent,Administrator

  - action: Cancel
    from: Confirmed
    to: Cancelled
    allowed: Administrator
