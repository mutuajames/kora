name: Order Item
module: Airtime
is_child_table: true
title_field: product
sort_field: idx
sort_order: ASC

fields:
  - fieldname: product
    fieldtype: Link
    label: Product
    options: Product
    reqd: true
    in_list_view: true
    constraints:
      - type: exists
        message: "Product does not exist."

  - fieldname: quantity
    fieldtype: Int
    label: Quantity
    reqd: true
    default: "1"
    constraints:
      - type: min
        value: 1
        message: "Quantity must be at least 1."
      - type: max
        value: 100
        message: "Quantity cannot exceed 100."

  - fieldname: unit_price
    fieldtype: Currency
    label: Unit Price (KES)
    linked_field: "product.selling_price"
    reqd: true
    constraints:
      - type: min
        value: 1
        message: "Unit price must be at least KES 1."

  - fieldname: line_total
    fieldtype: Currency
    label: Line Total (KES)
    computed: "quantity * unit_price"
    read_only: true
    description: Auto-computed from quantity × unit_price.
