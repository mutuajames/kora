name: Customer
module: Airtime
title_field: full_name
search_fields: full_name, phone, email
sort_field: modified
sort_order: DESC

fields:
  - fieldname: full_name
    fieldtype: Data
    label: Full Name
    reqd: true
    bold: true
    in_list_view: true
    search_index: true

  - fieldname: phone
    fieldtype: Data
    label: Phone Number
    options: Phone
    reqd: true
    in_list_view: true
    search_index: true
    constraints:
      - type: regex
        pattern: "^[0-9+\\-\\s]{7,20}$"
        message: "Enter a valid phone number (7-20 digits)."

  - fieldname: email
    fieldtype: Data
    label: Email
    options: Email
    in_list_view: true

  - fieldname: id_number
    fieldtype: Data
    label: National ID
    unique: true
    description: Government-issued ID for KYC compliance.

  - fieldname: customer_type
    fieldtype: Select
    label: Customer Type
    options: |
      Individual
      Business
      Reseller
    default: Individual
    in_list_view: true
    in_standard_filter: true

  - fieldname: is_active
    fieldtype: Check
    label: Active
    default: "1"
    in_list_view: true
