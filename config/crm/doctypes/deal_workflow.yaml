name: Deal Pipeline
document_type: Deal
is_active: true
workflow_state_field: status

states:
  - state: Lead
    doc_status: 0
    allow_edit: Sales Rep, Sales Manager, Administrator
    style: default

  - state: Qualified
    doc_status: 0
    allow_edit: Sales Rep, Sales Manager, Administrator
    style: info

  - state: Proposal
    doc_status: 0
    allow_edit: Sales Rep, Sales Manager, Administrator
    style: warning

  - state: Negotiation
    doc_status: 0
    allow_edit: Sales Manager, Administrator
    style: warning

  - state: Closed Won
    doc_status: 1
    allow_edit: ""
    style: success

  - state: Closed Lost
    doc_status: 1
    allow_edit: ""
    style: danger

transitions:
  - action: Qualify
    from: Lead
    to: Qualified
    allowed: Sales Rep, Sales Manager, Administrator
    condition: "len(doc.items) > 0"

  - action: Create Proposal
    from: Qualified
    to: Proposal
    allowed: Sales Rep, Sales Manager, Administrator
    require_fields:
      - expected_close_date

  - action: Start Negotiation
    from: Proposal
    to: Negotiation
    allowed: Sales Rep, Sales Manager, Administrator

  - action: Close Won
    from: Negotiation
    to: Closed Won
    allowed: Sales Manager, Administrator
    condition: "doc.total > 0"

  - action: Close Lost
    from: Lead
    to: Closed Lost
    allowed: Sales Rep, Sales Manager, Administrator

  - action: Close Lost
    from: Qualified
    to: Closed Lost
    allowed: Sales Rep, Sales Manager, Administrator

  - action: Close Lost
    from: Proposal
    to: Closed Lost
    allowed: Sales Manager, Administrator

  - action: Close Lost
    from: Negotiation
    to: Closed Lost
    allowed: Sales Manager, Administrator

  - action: Reopen
    from: Closed Lost
    to: Lead
    allowed: Sales Manager, Administrator
