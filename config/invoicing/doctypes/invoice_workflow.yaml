name: Invoice Workflow
document_type: Invoice
is_active: true
workflow_state_field: status

states:
  - state: Draft
    doc_status: 0
    allow_edit: Billing Clerk, Administrator
    style: default
  - state: Sent
    doc_status: 0
    allow_edit: Billing Clerk, Administrator
    style: info
  - state: Paid
    doc_status: 1
    allow_edit: ""
    style: success
  - state: Overdue
    doc_status: 1
    allow_edit: ""
    style: danger
  - state: Cancelled
    doc_status: 2
    allow_edit: ""
    style: default

transitions:
  - action: Send
    from: Draft
    to: Sent
    allowed: Billing Clerk, Administrator
  - action: Mark Paid
    from: Sent
    to: Paid
    allowed: Billing Clerk, Administrator
  - action: Mark Paid
    from: Overdue
    to: Paid
    allowed: Billing Clerk, Administrator
  - action: Cancel
    from: Draft
    to: Cancelled
    allowed: Administrator
  - action: Cancel
    from: Sent
    to: Cancelled
    allowed: Administrator
