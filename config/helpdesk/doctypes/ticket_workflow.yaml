name: Ticket Workflow
document_type: Ticket
is_active: true
workflow_state_field: status

states:
  - state: Open
    doc_status: 0
    allow_edit: Support Agent, Support Manager, Administrator
    style: default
  - state: In Progress
    doc_status: 0
    allow_edit: Support Agent, Support Manager, Administrator
    style: info
  - state: Waiting on Customer
    doc_status: 0
    allow_edit: Support Agent, Support Manager, Administrator
    style: warning
  - state: Resolved
    doc_status: 1
    allow_edit: ""
    style: success
  - state: Closed
    doc_status: 1
    allow_edit: ""
    style: default

transitions:
  - action: Start Work
    from: Open
    to: In Progress
    allowed: Support Agent, Support Manager, Administrator
    require_fields:
      - assigned_to
  - action: Waiting
    from: In Progress
    to: Waiting on Customer
    allowed: Support Agent, Support Manager, Administrator
  - action: Resume
    from: Waiting on Customer
    to: In Progress
    allowed: Support Agent, Support Manager, Administrator
  - action: Resolve
    from: In Progress
    to: Resolved
    allowed: Support Agent, Support Manager, Administrator
    require_fields:
      - resolution
  - action: Reopen
    from: Resolved
    to: In Progress
    allowed: Support Manager, Administrator
  - action: Close
    from: Resolved
    to: Closed
    allowed: Support Manager, Administrator
